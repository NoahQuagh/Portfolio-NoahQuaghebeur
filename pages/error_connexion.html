<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erreur</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #0a0a0a;
            color: #e8e8e8;
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }
        .bg-grid {
            position: absolute; inset: 0;
            background-image:
                    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 48px 48px;
        }
        .glow {
            position: absolute;
            width: 500px; height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(200,64,26,0.06) 0%, transparent 70%);
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        .card {
            position: relative;
            max-width: 520px;
            width: 100%;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 3rem;
            background: rgba(255,255,255,0.02);
            backdrop-filter: blur(8px);
            text-align: center;
        }
        .error-code {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.2);
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .error-code::before,
        .error-code::after {
            content: '';
            height: 1px;
            width: 40px;
            background: rgba(255,255,255,0.1);
            display: block;
        }
        .icon {
            font-size: 48px;
            margin-bottom: 1.5rem;
            display: block;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        h1 {
            font-family: 'Syne', sans-serif;
            font-size: clamp(24px, 5vw, 36px);
            font-weight: 800;
            letter-spacing: -0.03em;
            line-height: 1.1;
            margin-bottom: 1rem;
        }
        h1 em { font-style: normal; color: #f0a060; }
        p {
            font-size: 14px;
            color: rgba(255,255,255,0.45);
            line-height: 1.75;
            margin-bottom: 2rem;
            max-width: 380px;
            margin-left: auto;
            margin-right: auto;
        }
        .status-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 12px;
            color: rgba(255,255,255,0.25);
            margin-bottom: 2.5rem;
            padding: 10px 20px;
            background: rgba(255,255,255,0.03);
            border-radius: 100px;
            border: 1px solid rgba(255,255,255,0.06);
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }
        .dot-anim {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: #e84040;
            animation: blink 1.5s ease-in-out infinite;
        }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.7);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 12px;
            letter-spacing: 0.06em;
            padding: 10px 22px;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
            margin: 0 6px;
        }
        .btn-back:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.25);
            color: #fff;
        }
        .btn-retry {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #fff;
            border: none;
            color: #0a0a0a;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 12px;
            letter-spacing: 0.06em;
            padding: 10px 22px;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
            margin: 0 6px;
        }
        .btn-retry:hover { background: #e0e0e0; transform: translateY(-1px); }
        .btns { display: flex; justify-content: center; flex-wrap: wrap; gap: 8px; }
        .footer-note {
            margin-top: 2.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255,255,255,0.05);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 10px;
            color: rgba(255,255,255,0.15);
            letter-spacing: 0.06em;
        }
        .countdown {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            color: rgba(255,255,255,0.2);
            margin-top: 1rem;
        }
    </style>
</head>
<body>
<div class="bg-grid"></div>
<div class="glow"></div>

<div class="card">
    <div class="error-code">ERREUR</div>
    <span class="icon">🔌</span>
    <h1>Site <em>temporairement</em><br>indisponible</h1>
    <p>Le Site est actuellement inaccessible. Cela peut être dû à une maintenance, un redémarrage ou une interruption temporaire de la connexion.</p>

    <div class="btns">
        <a class="btn-back" onclick="history.back(); return false;" href="#">← Retour</a>
        <a class="btn-retry" onclick="location.reload(); return false;" href="#">↻ Réessayer</a>
    </div>

    <div class="countdown" id="countdown">Nouvelle tentative dans <span id="timer">30</span>s</div>

</div>

<script>
    let t = 30;
    const el = document.getElementById('timer');
    const interval = setInterval(() => {
        t--;
        el.textContent = t;
        if (t <= 0) {
            clearInterval(interval);
            document.getElementById('countdown').textContent = 'Tentative de reconnexion...';
            setTimeout(() => location.reload(), 500);
        }
    }, 1000);
</script>
</body>
</html>
