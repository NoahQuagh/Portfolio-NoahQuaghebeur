<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestionnaire de Planning d'Usinage</title>
    <link rel="stylesheet" href="assets/style/accueil.css">
</head>
<body>

<div class="container">
    <h1>🗓️ Planning Annuel d'Usinage (+2 mois)</h1>

    <div class="form-container">
        <h2>Ajouter une Affaire</h2>
        <form id="form-affaire">
            <input type="text" id="nom" placeholder="Nom de l'affaire (ex: Moule x4)" required>
            <label>Début : <input type="date" id="date-debut" required></label>
            <label>Fin : <input type="date" id="date-fin" required></label>
            <button type="submit">Ajouter au planning</button>
        </form>
    </div>

    <div class="timeline-wrapper">
        <div class="gantt-container" id="gantt">
        </div>
    </div>
</div>

<script src="assets/script/accueil.js"></script>
</body>
</html>
