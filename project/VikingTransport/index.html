<body>

<div class="theme-float">

    <div class="iconmenu">
      <img src="assets/img/light_mode.svg" alt="house" onclick="">

  </div>
</div>

<div id="sidebar-overlay"></div>

<aside id="sidebar">
  <div>
    <nav>
      <ul class="header-nav" id="header-nav">
        <li onclick="accueil()">
          <div class="iconmenu"><img src="assets/img/house.svg" alt="house"></div>
          <a>Accueil</a>

        <li onclick="ligne()">
          <div class="iconmenu"><img src="assets/img/map.svg" alt="house"></div>
          <a>Lignes</a>

        <li onclick="tarif()">
          <div class="iconmenu"><img src="assets/img/payments.svg" alt="house"></div>
          <a>Tarifs</a>
        </li>
      </ul>
    </nav>
  </div>
  <nav>
    <ul class="header-nav" id="header-nav-2">
      <button id="theme-toggle-btn" onclick="toggleTheme()">

        </div>
        <span class="theme-label">Light Mode</span>
      </button>
      </li>
    </ul>
  </nav>

<header>

        <button id="menu-btn" onclick="toggleMenu()" style="background:none;border:none;cursor:pointer;padding:6px;display:flex;align-items:center;justify-content:center;border-radius:8px;">

      </div>
      <div class="logo">
        <img src="assets/img/logo.png" alt="logo">
      </div>
    </div>
    <div class="head-barre">
      <nav class="sliding-nav-container">
        <ul class="nav-pills-custom" id="customNav">
          <span class="indicator"></span>
          <li class="nav-item">
            <button class="nav-link active" data-name="home" onclick="accueil()">Accueil</button>
          </li>
          <li class="nav-item">
            <button class="nav-link" data-name="parcours" onclick="ligne()">Lignes</button>
          </li>
          <li class="nav-item">
            <button class="nav-link" data-name="projet" onclick="tarif()">Tarifs</button>
          </li>
        </ul>
      </nav>

    <div onclick="compte()" class="compteHeader">

        <img src="assets/img/person.svg" alt="house" onclick="">
